<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이상형 월드컵(동물) 🏆</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #333;
  }
  .container {
    width: 100%;
    max-width: 900px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    padding: 32px;
    backdrop-filter: blur(10px);
  }
  h1 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 24px;
    font-size: 0.95rem;
  }
  .stages {
    display: flex;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 16px;
  }
  .stage-pill {
    flex: 1;
    text-align: center;
    padding: 10px 4px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 700;
    color: #bbb;
    background: #f3f3f3;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .stage-pill.done {
    color: #4caf50;
    background: #e8f5e9;
  }
  .stage-pill.done::after {
    content: '✓';
    position: absolute;
    top: -6px;
    right: -2px;
    background: #4caf50;
    color: white;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stage-pill.current {
    color: white;
    background: linear-gradient(135deg, #667eea, #764ba2);
    transform: scale(1.08);
    box-shadow: 0 6px 16px rgba(102, 126, 234, 0.35);
  }
  .stage-info {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: #888;
  }
  .stage-info strong {
    color: #667eea;
    font-size: 1.15rem;
  }
  .vs-container {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: center;
    margin-bottom: 24px;
  }
  .item-card {
    background: white;
    border-radius: 20px;
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    border: 3px solid transparent;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    user-select: none;
  }
  .item-card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: #667eea;
    box-shadow: 0 16px 40px rgba(102, 126, 234, 0.25);
  }
  .item-card:active { transform: translateY(-2px) scale(1.0); }
  .item-emoji {
    font-size: 6rem;
    margin-bottom: 12px;
    line-height: 1;
    text-align: center;
  }
  .item-name { font-size: 1.4rem; font-weight: 700; color: #333; }
  .vs-badge {
    font-size: 1.5rem;
    font-weight: 900;
    color: white;
    background: linear-gradient(135deg, #667eea, #764ba2);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
  }
  .progress {
    width: 100%;
    height: 8px;
    background: #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #f093fb);
    transition: width 0.4s ease;
    border-radius: 4px;
  }
  .progress-text {
    text-align: center;
    font-size: 0.85rem;
    color: #888;
  }
  .start-screen, .winner-screen {
    text-align: center;
    padding: 24px 0;
  }
  .start-screen p { color: #666; margin-bottom: 24px; line-height: 1.6; }
  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 16px 40px;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    margin: 4px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(102, 126, 234, 0.4); }
  .btn-secondary { background: linear-gradient(135deg, #f093fb, #f5576c); box-shadow: 0 8px 20px rgba(245, 87, 108, 0.3); }
  .winner-emoji {
    font-size: 10rem;
    margin: 16px 0;
    line-height: 1;
    animation: bounce 1s infinite alternate;
  }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-16px); } }
  .winner-name { font-size: 2.5rem; font-weight: 900; margin-bottom: 8px; color: #333; }
  .winner-label { color: #888; margin-bottom: 24px; font-size: 1.1rem; }
  .hidden { display: none !important; }
  .stats-box {
    margin-top: 28px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.7);
    border-radius: 16px;
    border: 1px solid rgba(102, 126, 234, 0.15);
    text-align: left;
  }
  .stats-box h3 {
    font-size: 1rem;
    margin-bottom: 12px;
    text-align: center;
    color: #555;
  }
  .stats-box ol {
    list-style: none;
    counter-reset: rank;
    padding: 0;
  }
  .stats-box li {
    counter-increment: rank;
    padding: 8px 12px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.95rem;
  }
  .stats-box li:nth-child(odd) { background: rgba(102, 126, 234, 0.06); }
  .stats-box li::before {
    content: counter(rank);
    font-weight: 800;
    color: #667eea;
    width: 22px;
    text-align: center;
  }
  .stats-box .count {
    margin-left: auto;
    color: #888;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .stats-box .empty {
    text-align: center;
    color: #aaa;
    padding: 12px 0;
    font-size: 0.9rem;
  }
  .btn-ghost {
    display: block;
    margin: 12px auto 0;
    background: transparent;
    border: 1px solid #ddd;
    color: #888;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .btn-ghost:hover { background: #f5f5f5; color: #555; }
  .winner-meta { color: #aaa; font-size: 0.9rem; margin-bottom: 16px; }
  .transition-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.97), rgba(118, 75, 162, 0.97));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
    backdrop-filter: blur(8px);
  }
  .transition-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .transition-content {
    text-align: center;
    color: white;
    transform: scale(0.5);
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
  }
  .transition-overlay.show .transition-content {
    transform: scale(1);
    opacity: 1;
  }
  .transition-emoji { font-size: 6rem; margin-bottom: 16px; line-height: 1; }
  .transition-from {
    font-size: 1.1rem;
    opacity: 0.75;
    margin-bottom: 4px;
    text-decoration: line-through;
  }
  .transition-arrow { font-size: 1.8rem; margin: 8px 0; opacity: 0.6; }
  .transition-to {
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: -1px;
  }
  .transition-sub {
    margin-top: 16px;
    font-size: 1rem;
    opacity: 0.85;
    font-weight: 600;
  }
  @media (max-width: 600px) {
    .stage-pill { font-size: 0.7rem; padding: 8px 2px; }
    .stage-pill.done::after { width: 14px; height: 14px; font-size: 0.55rem; }
    .container { padding: 20px; }
    h1 { font-size: 1.5rem; }
    .item-emoji { font-size: 4rem; }
    .item-name { font-size: 1.1rem; }
    .vs-badge { width: 44px; height: 44px; font-size: 1.1rem; }
    .item-card { padding: 20px 8px; }
    .winner-emoji { font-size: 7rem; }
    .winner-name { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🏆 이상형 월드컵(동물)</h1>
  <p class="subtitle">32강부터 시작! 당신의 최애 동물은?</p>

  <div id="start-screen" class="start-screen">
    <p>총 32마리의 동물이 토너먼트로 대결합니다.<br>둘 중 하나를 골라 우승자를 가려보세요!</p>
    <button class="btn" onclick="startGame()">시작하기 🚀</button>
    <div id="start-stats" class="stats-box hidden">
      <h3>🏅 역대 우승 TOP 5</h3>
      <ol id="start-stats-list"></ol>
      <button class="btn-ghost" onclick="resetStats()">통계 초기화</button>
    </div>
  </div>

  <div id="game-screen" class="hidden">
    <div class="stages" id="stages">
      <div class="stage-pill" data-size="32">32강</div>
      <div class="stage-pill" data-size="16">16강</div>
      <div class="stage-pill" data-size="8">8강</div>
      <div class="stage-pill" data-size="4">4강</div>
      <div class="stage-pill" data-size="2">결승</div>
    </div>
    <div class="stage-info" id="stage-info">현재 <strong>32강</strong> · 1 / 16 경기</div>
    <div class="progress"><div class="progress-bar" id="progress-bar" style="width: 0%"></div></div>
    <p class="progress-text" id="progress-text">0 / 31</p>
    <div class="vs-container">
      <div class="item-card" id="item-left" onclick="choose(0)">
        <div class="item-emoji" id="emoji-left"></div>
        <div class="item-name" id="name-left"></div>
      </div>
      <div class="vs-badge">VS</div>
      <div class="item-card" id="item-right" onclick="choose(1)">
        <div class="item-emoji" id="emoji-right"></div>
        <div class="item-name" id="name-right"></div>
      </div>
    </div>
  </div>

  <div class="transition-overlay" id="transition-overlay">
    <div class="transition-content">
      <div class="transition-emoji" id="transition-emoji">🎉</div>
      <div class="transition-from" id="transition-from">32강 종료</div>
      <div class="transition-arrow">↓</div>
      <div class="transition-to" id="transition-to">16강</div>
      <div class="transition-sub" id="transition-sub">시작합니다!</div>
    </div>
  </div>

  <div id="winner-screen" class="winner-screen hidden">
    <p class="winner-label">🎉 우승 🎉</p>
    <div class="winner-emoji" id="winner-emoji"></div>
    <div class="winner-name" id="winner-name"></div>
    <p class="winner-label">당신의 최애 동물이에요!</p>
    <p class="winner-meta" id="winner-meta"></p>
    <button class="btn" onclick="restart()">다시 하기 🔄</button>
    <button class="btn btn-secondary" onclick="shareResult()">결과 공유 📤</button>
    <div class="stats-box">
      <h3>🏅 역대 우승 TOP 5</h3>
      <ol id="winner-stats-list"></ol>
    </div>
  </div>
</div>

<script>
  const ITEMS = [
    { name: '강아지',   emoji: '🐶' },
    { name: '고양이',   emoji: '🐱' },
    { name: '토끼',     emoji: '🐰' },
    { name: '판다',     emoji: '🐼' },
    { name: '코알라',   emoji: '🐨' },
    { name: '사자',     emoji: '🦁' },
    { name: '호랑이',   emoji: '🐯' },
    { name: '여우',     emoji: '🦊' },
    { name: '늑대',     emoji: '🐺' },
    { name: '너구리',   emoji: '🦝' },
    { name: '곰',       emoji: '🐻' },
    { name: '사슴',     emoji: '🦌' },
    { name: '소',       emoji: '🐮' },
    { name: '돼지',     emoji: '🐷' },
    { name: '개구리',   emoji: '🐸' },
    { name: '원숭이',   emoji: '🐵' },
    { name: '캥거루',   emoji: '🦘' },
    { name: '기린',     emoji: '🦒' },
    { name: '얼룩말',   emoji: '🦓' },
    { name: '코끼리',   emoji: '🐘' },
    { name: '고슴도치', emoji: '🦔' },
    { name: '수달',     emoji: '🦦' },
    { name: '햄스터',   emoji: '🐹' },
    { name: '말',       emoji: '🐎' },
    { name: '닭',       emoji: '🐔' },
    { name: '펭귄',     emoji: '🐧' },
    { name: '독수리',   emoji: '🦅' },
    { name: '부엉이',   emoji: '🦉' },
    { name: '고래',     emoji: '🐳' },
    { name: '돌고래',   emoji: '🐬' },
    { name: '상어',     emoji: '🦈' },
    { name: '거북이',   emoji: '🐢' },
  ];

  const STATS_KEY = 'animal-worldcup-stats-v1';

  function loadStats() {
    try { return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function saveStats(stats) {
    localStorage.setItem(STATS_KEY, JSON.stringify(stats));
  }
  function recordWin(item) {
    const stats = loadStats();
    if (!stats[item.name]) stats[item.name] = { count: 0, emoji: item.emoji };
    stats[item.name].count++;
    stats[item.name].emoji = item.emoji;
    saveStats(stats);
  }
  function totalWins() {
    return Object.values(loadStats()).reduce((s, v) => s + v.count, 0);
  }
  function renderStatsList(elementId) {
    const stats = loadStats();
    const sorted = Object.entries(stats)
      .map(([name, v]) => ({ name, emoji: v.emoji, count: v.count }))
      .sort((a, b) => b.count - a.count)
      .slice(0, 5);
    const el = document.getElementById(elementId);
    if (sorted.length === 0) {
      el.innerHTML = '<li class="empty">아직 기록이 없어요. 첫 우승의 주인공은?</li>';
      return;
    }
    el.innerHTML = sorted.map(s =>
      `<li><span style="font-size:1.4rem">${s.emoji}</span><span>${s.name}</span><span class="count">${s.count}회 우승</span></li>`
    ).join('');
  }
  function resetStats() {
    if (!confirm('정말 통계를 초기화할까요?')) return;
    localStorage.removeItem(STATS_KEY);
    refreshStartStats();
  }
  function refreshStartStats() {
    const box = document.getElementById('start-stats');
    if (totalWins() > 0) {
      box.classList.remove('hidden');
      renderStatsList('start-stats-list');
    } else {
      box.classList.add('hidden');
    }
  }

  let currentRound = [];
  let nextRound = [];
  let matchIndex = 0;
  let totalMatches = 0;
  let completedMatches = 0;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startGame() {
    currentRound = shuffle(ITEMS);
    nextRound = [];
    matchIndex = 0;
    completedMatches = 0;
    totalMatches = ITEMS.length - 1;
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('winner-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    showMatch();
  }

  function getStageName(roundSize) {
    if (roundSize === 32) return '32강';
    if (roundSize === 16) return '16강';
    if (roundSize === 8)  return '8강';
    if (roundSize === 4)  return '4강';
    if (roundSize === 2)  return '결승';
    return `${roundSize}강`;
  }

  function updateStagePills(currentSize) {
    document.querySelectorAll('.stage-pill').forEach(pill => {
      const size = parseInt(pill.dataset.size, 10);
      pill.classList.remove('current', 'done');
      if (size > currentSize) pill.classList.add('done');
      else if (size === currentSize) pill.classList.add('current');
    });
  }

  function showMatch() {
    const left = currentRound[matchIndex];
    const right = currentRound[matchIndex + 1];
    document.getElementById('emoji-left').textContent = left.emoji;
    document.getElementById('name-left').textContent = left.name;
    document.getElementById('emoji-right').textContent = right.emoji;
    document.getElementById('name-right').textContent = right.name;

    const stage = getStageName(currentRound.length);
    const matchNum = matchIndex / 2 + 1;
    const totalInStage = currentRound.length / 2;
    updateStagePills(currentRound.length);
    document.getElementById('stage-info').innerHTML =
      `현재 <strong>${stage}</strong> · ${matchNum} / ${totalInStage} 경기`;
    const pct = (completedMatches / totalMatches) * 100;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${completedMatches} / ${totalMatches}`;
  }

  function showTransition(fromSize, toSize, callback) {
    const overlay = document.getElementById('transition-overlay');
    const emojis = { 16: '🎉', 8: '🔥', 4: '💪', 2: '🏆' };
    const subs = {
      16: '16강에 오를 16마리가 정해졌어요',
      8: '8강 진출! 점점 치열해져요',
      4: '4강이에요! 거의 다 왔어요',
      2: '드디어 결승전입니다 🎊'
    };
    document.getElementById('transition-emoji').textContent = emojis[toSize] || '✨';
    document.getElementById('transition-from').textContent = `${getStageName(fromSize)} 종료`;
    document.getElementById('transition-to').textContent = `${getStageName(toSize)} 시작`;
    document.getElementById('transition-sub').textContent = subs[toSize] || '';
    overlay.classList.add('show');
    setTimeout(() => {
      overlay.classList.remove('show');
      setTimeout(callback, 350);
    }, 1800);
  }

  function choose(side) {
    const winner = currentRound[matchIndex + side];
    nextRound.push(winner);
    matchIndex += 2;
    completedMatches++;

    if (matchIndex >= currentRound.length) {
      if (nextRound.length === 1) {
        showWinner(nextRound[0]);
        return;
      }
      const fromSize = currentRound.length;
      currentRound = nextRound;
      nextRound = [];
      matchIndex = 0;
      showTransition(fromSize, currentRound.length, showMatch);
      return;
    }
    showMatch();
  }

  function showWinner(item) {
    recordWin(item);
    const stats = loadStats();
    const myCount = stats[item.name].count;
    document.getElementById('progress-bar').style.width = '100%';
    document.getElementById('progress-text').textContent = `${totalMatches} / ${totalMatches}`;
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('winner-emoji').textContent = item.emoji;
    document.getElementById('winner-name').textContent = item.name;
    document.getElementById('winner-meta').textContent =
      myCount === 1 ? '🎊 첫 우승이에요!' : `이 동물은 ${myCount}번째 우승이에요`;
    renderStatsList('winner-stats-list');
    document.getElementById('winner-screen').classList.remove('hidden');
    window._winner = item;
  }

  function restart() {
    document.getElementById('winner-screen').classList.add('hidden');
    document.getElementById('start-screen').classList.remove('hidden');
    refreshStartStats();
  }

  refreshStartStats();

  function shareResult() {
    const w = window._winner;
    const text = `🏆 이상형 월드컵(동물) 우승: ${w.emoji} ${w.name}!`;
    if (navigator.share) {
      navigator.share({ title: '이상형 월드컵(동물)', text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text).then(() => alert('결과가 클립보드에 복사되었어요!'));
    }
  }
</script>
</body>
</html>
